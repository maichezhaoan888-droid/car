<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>買車找安｜銀行端貸款資質精算系統</title>
    
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-TXBZ7MQTWE"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-TXBZ7MQTWE');
    </script>

    <style>
        :root { 
            --accent-gold: #B8860B; 
            --safe-green: #2E7D32; 
            --warn-red: #D32F2F; 
            --bg-white: #F8F9FA; 
            --card-white: #FFFFFF;
            --text-main: #212529;
            --text-sub: #6C757D;
            --border-color: #DEE2E6;
        }
        body { 
            font-family: 'Inter', 'PingFang TC', 'Microsoft JhengHei', sans-serif; 
            background-color: var(--bg-white); 
            color: var(--text-main); 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            justify-content: center;
            line-height: 1.6;
        }
        .container { 
            max-width: 440px; 
            width: 100%; 
            background: var(--card-white); 
            padding: 40px 30px; 
            border-radius: 16px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); 
            border: 1px solid var(--border-color);
        }
        .header { text-align: center; margin-bottom: 35px; border-bottom: 2px solid var(--accent-gold); padding-bottom: 15px; }
        .header h1 { 
            color: var(--text-main); 
            font-size: 24px; 
            font-weight: 800;
            margin: 0; 
            letter-spacing: 1px;
        }
        .header p { font-size: 13px; color: var(--text-sub); margin-top: 5px; font-weight: 500; }
        
        .form-group { margin-bottom: 18px; }
        label { 
            display: block; 
            margin-bottom: 6px; 
            color: var(--text-main); 
            font-size: 14px; 
            font-weight: 700;
        }
        input, select { 
            width: 100%; 
            padding: 12px 15px; 
            background: #FFFFFF; 
            border: 1px solid var(--border-color); 
            color: var(--text-main); 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 15px;
            transition: all 0.2s ease;
        }
        input:focus, select:focus { border-color: var(--accent-gold); outline: none; box-shadow: 0 0 0 3px rgba(184, 134, 11, 0.1); }
        
        .btn-calc { 
            width: 100%; 
            padding: 16px; 
            background: var(--text-main);
            color: #FFFFFF; 
            font-weight: 700; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 16px; 
            margin-top: 10px;
            transition: 0.3s;
        }
        .btn-calc:hover { background: #000000; }

        .result-card { 
            display: none; 
            margin-top: 25px; 
            padding: 25px; 
            border-radius: 12px; 
            background: #F1F3F5; 
            text-align: center;
            animation: slideIn 0.4s ease-out;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .status-badge { 
            display: inline-block; 
            padding: 4px 16px; 
            border-radius: 4px; 
            font-weight: 800; 
            font-size: 12px; 
            margin-bottom: 15px;
            color: #FFF;
        }
        .price-display { font-size: 42px; font-weight: 800; margin: 5px 0; color: var(--text-main); font-family: 'Arial', sans-serif; }
        .advisor-note { font-size: 14px; margin: 15px 0; line-height: 1.7; color: #495057; }
        
        .disclaimer-box { 
            font-size: 11px; 
            color: #adb5bd; 
            margin-top: 25px; 
            padding-top: 15px; 
            border-top: 1px solid var(--border-color); 
            line-height: 1.6; 
            text-align: left;
        }
        .linktree-btn { 
            display: block; 
            background: var(--accent-gold); 
            color: #FFF; 
            text-align: center; 
            padding: 14px; 
            border-radius: 8px; 
            text-decoration: none; 
            font-weight: 700; 
            font-size: 15px; 
            transition: 0.3s;
        }
        .linktree-btn:hover { filter: brightness(1.1); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>買車找安</h1>
        <p>銀行端車貸收支比精算系統</p>
    </div>

    <div class="form-group">
        <label>車輛總價值 (萬)</label>
        <input type="number" id="totalPrice" placeholder="請輸入欲購入車價">
    </div>
    <div class="form-group">
        <label>預計首付款 (萬)</label>
        <input type="number" id="downPayment" value="20">
    </div>
    <div class="form-group">
        <label>實領月收入 (元)</label>
        <input type="number" id="monthlyIncome" placeholder="請輸入每月實領薪資">
    </div>
    <div class="form-group">
        <label>攤還期數</label>
        <select id="loanYears">
            <option value="5">60 期 (5年)</option>
            <option value="6">72 期 (6年)</option>
            <option value="7" selected>84 期 (7年)</option>
            <option value="8">96 期 (8年)</option>
        </select>
    </div>
    <div class="form-group">
        <label>資質權重</label>
        <select id="creditStatus">
            <option value="3.5">A 級 - 優質客群 (百大/公教)</option>
            <option value="5.5" selected>B 級 - 一般客群 (薪轉/勞保)</option>
            <option value="8.5">C 級 - 特殊客群 (領現/小白)</option>
        </select>
    </div>

    <button class="btn-calc" onclick="calculateLoan()">啟動數據模擬</button>

    <div id="result" class="result-card">
        <div id="badge" class="status-badge">ANALYSIS</div>
        <div style="font-size: 11px; color: #adb5bd; font-weight: 700;">預估每月還款額</div>
        <div id="monthlyPay" class="price-display">$0</div>
        <div id="advisorNote" class="advisor-note"></div>
        
        <div class="contact-area">
            <a href="https://linktr.ee/maichezhaoan888" target="_blank" class="linktree-btn" onclick="gtag('event', 'click_consult');">
                預約資質過件諮詢
            </a>
        </div>

        <div class="disclaimer-box">
            <strong>SYSTEM NOTICE:</strong><br>
            • 本試算採用銀行收支比邏輯，結果僅供初步參考。<br>
            • 實際利率、額度及過件與否，須以撥款銀行最終審核為主。
        </div>
    </div>
</div>

<script>
    function calculateLoan() {
        const price = parseFloat(document.getElementById('totalPrice').value) * 10000;
        const down = parseFloat(document.getElementById('downPayment').value) * 10000;
        const income = parseFloat(document.getElementById('monthlyIncome').value);
        const years = parseInt(document.getElementById('loanYears').value);
        const annualRate = parseFloat(document.getElementById('creditStatus').value) / 100;

        if (!price || !income) { alert('請填寫完整數據'); return; }

        const loanAmount = price - down;
        const monthlyRate = annualRate / 12;
        const months = years * 12;
        const monthlyPay = Math.round((loanAmount * monthlyRate * Math.pow(1 + monthlyRate, months)) / (Math.pow(1 + monthlyRate, months) - 1));
        const ratio = monthlyPay / income;

        document.getElementById('monthlyPay').innerText = '$' + monthlyPay.toLocaleString();
        gtag('event', 'calculate_loan', { 'value': price/10000, 'loan_ratio': ratio.toFixed(2) });

        const badge = document.getElementById('badge');
        const note = document.getElementById('advisorNote');

        if (ratio <= 0.2) {
            badge.innerText = "GOLD / 優質資質"; badge.style.background = "var(--accent-gold)";
            note.innerHTML = "數據表現極佳。屬銀行優先承作對象。建議聯繫<strong>找安</strong>獲取專案最低利。";
        } else if (ratio <= 0.45) {
            badge.innerText = "SAFE / 綠色安全"; badge.style.background = "var(--safe-green)";
            note.innerHTML = "收支比處於穩定區間。請確保薪轉證明齊全，以利銀行加速審核進度。";
        } else {
            badge.innerText = "RISK / 紅色警戒"; badge.style.background = "var(--warn-red)";
            note.innerHTML = "負債佔比已達警戒水位。<strong>請勿盲目送審</strong>以免影響信用，請諮詢專業優化。";
        }
        document.getElementById('result').style.display = 'block';
    }
</script>
</body>
</html>
