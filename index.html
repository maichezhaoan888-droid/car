<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>繃安｜銀行端貸款資質試算系統</title>
    
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-TXBZ7MQTWE"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-TXBZ7MQTWE');
    </script>

    <style>
        :root { 
            --premium-gold: #C5A059; 
            --safe-green: #43A047; 
            --warn-red: #E53935; 
            --bg-deep: #0F0F0F; 
            --card-surface: #1A1A1A;
            --input-border: #333;
        }
        body { 
            font-family: 'Inter', 'PingFang TC', 'Microsoft JhengHei', sans-serif; 
            background-color: var(--bg-deep); 
            color: #E0E0E0; 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            justify-content: center;
            line-height: 1.6;
        }
        .container { 
            max-width: 440px; 
            width: 100%; 
            background: var(--card-surface); 
            padding: 40px 30px; 
            border-radius: 24px; 
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 20px 40px rgba(0,0,0,0.8); 
        }
        .header { text-align: center; margin-bottom: 35px; }
        .header h1 { 
            color: var(--premium-gold); 
            font-size: 22px; 
            font-weight: 700;
            margin: 0; 
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .header p { font-size: 12px; color: #666; margin-top: 8px; letter-spacing: 1px; }
        
        .form-group { margin-bottom: 20px; }
        label { 
            display: block; 
            margin-bottom: 8px; 
            color: #999; 
            font-size: 13px; 
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        input, select { 
            width: 100%; 
            padding: 15px; 
            background: #252525; 
            border: 1px solid var(--input-border); 
            color: white; 
            border-radius: 12px; 
            box-sizing: border-box; 
            font-size: 15px;
            transition: all 0.3s ease;
        }
        input:focus { border-color: var(--premium-gold); outline: none; background: #2A2A2A; }
        
        .btn-calc { 
            width: 100%; 
            padding: 18px; 
            background: linear-gradient(135deg, #C5A059 0%, #A67C37 100%);
            color: #000; 
            font-weight: 800; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            font-size: 16px; 
            letter-spacing: 1px;
            margin-top: 10px;
            transition: 0.3s;
        }
        .btn-calc:hover { transform: translateY(-2px); filter: brightness(1.1); }

        .result-card { 
            display: none; 
            margin-top: 30px; 
            padding: 30px; 
            border-radius: 16px; 
            background: rgba(255,255,255,0.02); 
            border: 1px solid #333; 
            text-align: center;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .status-badge { 
            display: inline-block; 
            padding: 5px 25px; 
            border-radius: 4px; 
            font-weight: 800; 
            font-size: 12px; 
            margin-bottom: 20px;
            letter-spacing: 1px;
        }
        .price-display { font-size: 40px; font-weight: 800; margin: 5px 0; color: white; font-family: 'Arial', sans-serif; }
        .advisor-note { font-size: 14px; margin: 20px 0; line-height: 1.8; color: #BBB; }
        
        .disclaimer-box { 
            font-size: 10px; 
            color: #555; 
            margin-top: 25px; 
            padding: 15px; 
            border-top: 1px dotted #333; 
            line-height: 1.6; 
            text-align: left;
        }
        .linktree-btn { 
            display: block; 
            background: transparent; 
            color: var(--premium-gold); 
            text-align: center; 
            padding: 15px; 
            border-radius: 12px; 
            text-decoration: none; 
            font-weight: 700; 
            font-size: 15px; 
            border: 1px solid var(--premium-gold);
            transition: 0.3s;
        }
        .linktree-btn:hover { background: var(--premium-gold); color: black; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>BENG AN ACTUARY</h1>
        <p>銀行端車貸收支比模擬系統</p>
    </div>

    <div class="form-group">
        <label>車輛總價值 (萬)</label>
        <input type="number" id="totalPrice" placeholder="請輸入欲購入車價">
    </div>
    <div class="form-group">
        <label>預計首付款 (萬)</label>
        <input type="number" id="downPayment" value="20">
    </div>
    <div class="form-group">
        <label>年申報所得或實領月薪 (元)</label>
        <input type="number" id="monthlyIncome" placeholder="影響銀行 DBR 判定">
    </div>
    <div class="form-group">
        <label>攤還期數</label>
        <select id="loanYears">
            <option value="5">60 期 (5年)</option>
            <option value="6">72 期 (6年)</option>
            <option value="7" selected>84 期 (72年)</option>
            <option value="8">96 期 (8年)</option>
        </select>
    </div>
    <div class="form-group">
        <label>資質權重</label>
        <select id="creditStatus">
            <option value="3.5">A 級 - 優質客群 (百大/公教)</option>
            <option value="5.5" selected>B 級 - 一般客群 (薪轉/勞保)</option>
            <option value="8.5">C 級 - 特殊客群 (領現/瑕疵)</option>
        </select>
    </div>

    <button class="btn-calc" onclick="calculateLoan()">啟動精算模擬</button>

    <div id="result" class="result-card">
        <div id="badge" class="status-badge">ANALYSIS</div>
        <div style="font-size: 11px; color: #666; letter-spacing: 1px;">ESTIMATED MONTHLY PAYMENT</div>
        <div id="monthlyPay" class="price-display">$0</div>
        <div id="advisorNote" class="advisor-note"></div>
        
        <div class="contact-area">
            <a href="https://linktr.ee/maichezhaoan888" target="_blank" class="linktree-btn" onclick="gtag('event', 'click_consult');">
                獲取精準過件方案
            </a>
        </div>

        <div class="disclaimer-box">
            <strong>SYSTEM NOTICE:</strong><br>
            • 本模擬器採用銀行端「收支比」邏輯。結果僅供初步評估，不代表銀行實際撥款意願。
            • 實際利率、額度與開辦費須以撥款銀行最终審核為準。
        </div>
    </div>
</div>

<script>
    function calculateLoan() {
        const price = parseFloat(document.getElementById('totalPrice').value) * 10000;
        const down = parseFloat(document.getElementById('downPayment').value) * 10000;
        const income = parseFloat(document.getElementById('monthlyIncome').value);
        const years = parseInt(document.getElementById('loanYears').value);
        const annualRate = parseFloat(document.getElementById('creditStatus').value) / 100;

        if (!price || !income) { alert('請輸入完整審核數據'); return; }

        const loanAmount = price - down;
        const monthlyRate = annualRate / 12;
        const months = years * 12;
        const monthlyPay = Math.round((loanAmount * monthlyRate * Math.pow(1 + monthlyRate, months)) / (Math.pow(1 + monthlyRate, months) - 1));
        const ratio = monthlyPay / income;

        document.getElementById('monthlyPay').innerText = '$' + monthlyPay.toLocaleString();
        gtag('event', 'calculate_loan', { 'value': price/10000, 'loan_ratio': ratio.toFixed(2) });

        const badge = document.getElementById('badge');
        const note = document.getElementById('advisorNote');

        if (ratio <= 0.2) {
            badge.innerText = "EXCELLENT / 金色推薦"; badge.style.background = "var(--premium-gold)"; badge.style.color = "black";
            note.innerHTML = "數據表現極佳。屬銀行優先承作對象。建議聯繫<strong>專員</strong>解鎖專案利率。";
        } else if (ratio <= 0.45) {
            badge.innerText = "NORMAL / 綠色安全"; badge.style.background = "var(--safe-green)"; badge.style.color = "white";
            note.innerHTML = "收支比處於穩定區間。請確保薪轉證明齊全，以利銀行加速審核進度。";
        } else {
            badge.innerText = "RISK / 紅色警告"; badge.style.background = "var(--warn-red)"; badge.style.color = "white";
            note.innerHTML = "負債佔比已達警戒水位。<strong>請勿隨意送審</strong>以免留下退件紀錄，請聯繫專員協助。";
        }
        document.getElementById('result').style.display = 'block';
    }
</script>
</body>
</html>
