<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>買車找安｜車貸試算系統</title>

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-TXBZ7MQTWE"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-TXBZ7MQTWE');
    </script>

    <style>
        :root { 
            --accent-gold: #B8860B; 
            --safe-green: #2E7D32; 
            --warn-red: #D32F2F; 
            --bg-light: #F2F4F7; 
            --card-white: #FFFFFF; 
        }
        body { 
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; 
            background-color: var(--bg-light); 
            color: #333; 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            justify-content: center;
        }
        .container { 
            max-width: 440px; 
            width: 100%; 
            background: var(--card-white); 
            padding: 35px 25px; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.08); 
            border: 1px solid #E1E4E8;
        }
        .header { text-align: center; margin-bottom: 30px; border-bottom: 2.5px solid var(--accent-gold); padding-bottom: 15px; }
        .header h1 { color: #1A1A1A; font-size: 26px; font-weight: 900; margin: 0; }
        .header p { font-size: 13px; color: #777; margin-top: 5px; font-weight: bold; }
        
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #1A1A1A; font-size: 15px; font-weight: 700; }
        input, select { 
            width: 100%; 
            padding: 14px; 
            background: #FFF; 
            border: 1px solid #D1D5DB; 
            color: #333; 
            border-radius: 10px; 
            box-sizing: border-box; 
            font-size: 16px;
        }
        input:focus { border-color: var(--accent-gold); outline: none; box-shadow: 0 0 0 3px rgba(184,134,11,0.1); }
        
        .btn-calc { 
            width: 100%; 
            padding: 18px; 
            background: #1A1A1A;
            color: #FFF; 
            font-weight: 800; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            font-size: 18px; 
            margin-top: 10px;
            transition: 0.3s;
        }
        .btn-calc:hover { background: #000; transform: translateY(-1px); }

        .result-card { 
            display: none; 
            margin-top: 30px; 
            padding: 25px; 
            border-radius: 15px; 
            background: #F8F9FA; 
            border: 1px solid #E9ECEF;
            text-align: center;
        }
        .status-badge { display: inline-block; padding: 5px 20px; border-radius: 6px; font-weight: 900; font-size: 13px; margin-bottom: 15px; color: #FFF; }
        .price-display { font-size: 45px; font-weight: 900; margin: 5px 0; color: #1A1A1A; }
        .advisor-note { font-size: 15px; margin: 15px 0; line-height: 1.8; color: #444; }
        
        .contact-area { margin-top: 10px; }
        .contact-label { font-size: 13px; color: #B8860B; font-weight: bold; margin-bottom: 8px; }
        .linktree-btn { 
            display: block; 
            background: #FFFFFF; 
            color: #1A1A1A; 
            text-align: center; 
            padding: 15px; 
            border-radius: 10px; 
            text-decoration: none; 
            font-weight: 800; 
            font-size: 16px; 
            border: 2px solid #1A1A1A;
            transition: 0.3s;
        }
        .linktree-btn:hover { background: #1A1A1A; color: #FFF; }

        .disclaimer-box { 
            font-size: 11px; 
            color: #999; 
            margin-top: 25px; 
            padding-top: 15px; 
            border-top: 1px solid #EEE; 
            text-align: left; 
            line-height: 1.6;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>買車找安</h1>
        <p>車貸收支比試算系統</p>
    </div>

    <div class="form-group">
        <label>車輛總價值 (萬)</label>
        <input type="number" id="totalPrice" placeholder="輸入預計購入車價">
    </div>
    <div class="form-group">
        <label>預計首付款 (萬)</label>
        <input type="number" id="downPayment" value="20">
    </div>
    <div class="form-group">
        <label>實領月收入 (元)</label>
        <input type="number" id="monthlyIncome" placeholder="輸入每月薪資收入">
    </div>
    <div class="form-group">
        <label>攤還期數</label>
        <select id="loanYears">
            <option value="5">60 期 (5年)</option>
            <option value="6">72 期 (6年)</option>
            <option value="7" selected>84 期 (7年)</option>
            <option value="8">96 期 (8年)</option>
        </select>
    </div>
    <div class="form-group">
        <label>資質權重</label>
        <select id="creditStatus">
            <option value="3.5">A 級 - 優質客群 (百大/公教)</option>
            <option value="5.5" selected>B 級 - 一般客群 (薪轉/勞保)</option>
            <option value="8.5">C 級 - 特殊客群 (領現/小白)</option>
        </select>
    </div>

    <button class="btn-calc" onclick="calculateLoan()">啟動數據模擬</button>

    <div id="result" class="result-card">
        <div id="badge" class="status-badge">ANALYSIS</div>
        <div style="font-size: 11px; color: #999; font-weight: bold; letter-spacing: 1px;">預估每月還款額</div>
        <div id="monthlyPay" class="price-display">$0</div>
        <div id="advisorNote" class="advisor-note"></div>
        
        <div class="contact-area">
            <div class="contact-label">⚠️ 試算結果不代表最終核貸利率</div>
            <a href="https://linktr.ee/maichezhaoan888" target="_blank" class="linktree-btn" onclick="gtag('event', 'click_consult');">
                立即預約1 對 1 數據校準諮詢
            </a>
        </div>

        <div class="disclaimer-box">
            <strong>SYSTEM NOTICE:</strong><br>
            • 本系統採用銀行收支比邏輯，結果僅供初步參考。<br>
            • 實際貸款利率、額度及過件與否，須以撥款銀行最終審核及實領情況為主。
        </div>
    </div>
</div>

<script>
    function calculateLoan() {
        const price = parseFloat(document.getElementById('totalPrice').value) * 10000;
        const down = parseFloat(document.getElementById('downPayment').value) * 10000;
        const income = parseFloat(document.getElementById('monthlyIncome').value);
        const years = parseInt(document.getElementById('loanYears').value);
        const annualRate = parseFloat(document.getElementById('creditStatus').value) / 100;

        if (!price || !income) { alert('請輸入完整數據'); return; }

        const loanAmount = price - down;
        const monthlyRate = annualRate / 12;
        const months = years * 12;
        const monthlyPay = Math.round((loanAmount * monthlyRate * Math.pow(1 + monthlyRate, months)) / (Math.pow(1 + monthlyRate, months) - 1));
        const ratio = monthlyPay / income;

        document.getElementById('monthlyPay').innerText = '$' + monthlyPay.toLocaleString();
        gtag('event', 'calculate_loan', { 'value': price/10000, 'loan_ratio': ratio.toFixed(2) });

        const badge = document.getElementById('badge');
        const note = document.getElementById('advisorNote');

        if (ratio <= 0.2) {
            badge.innerText = "GOLD / 優質資質"; badge.style.background = "var(--accent-gold)";
            note.innerHTML = "數據表現極佳。屬銀行優先承作對象。建議聯繫<strong>繃安</strong>進行專案數據複核。";
        } else if (ratio <= 0.45) {
            badge.innerText = "SAFE / 綠色安全"; badge.style.background = "var(--safe-green)";
            note.innerHTML = "收支比處於穩定區間。建議進一步諮詢以確認最精準之核貸利率。";
        } else {
            badge.innerText = "RISK / 紅色警戒"; badge.style.background = "var(--warn-red)";
            note.innerHTML = "負債佔比已達警戒水位。<strong>請勿貿動以免影響信用</strong>，請先聯繫諮詢優化方案。";
        }
        document.getElementById('result').style.display = 'block';
    }
</script>
</body>
</html>
